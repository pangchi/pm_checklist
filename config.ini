[database]
host = localhost
port = 5432
name = pm_checklist
user = postgres
password = postgres

[app]
secret_key = change-this-to-a-random-secret-key
upload_folder = static/uploads
max_upload_mb = 16
debug = true
port = 5000
host = 0.0.0.0
# Max age of uploaded photos in minutes (checked via EXIF DateTimeOriginal)
# Photos with EXIF older than this are rejected. Set to 0 to disable.
photo_max_age_minutes = 60
# Default theme (overridden at runtime via Settings page, stored in DB)
# Options: industrial_dark, clean_light, midnight_navy, forest_green,
#          warm_amber, arctic_white, crimson_steel, pastel_studio
theme = industrial_dark

[checklist]
template_dir = checklists

[telegram]
# 1. Message @BotFather on Telegram -> /newbot -> paste the token below
bot_token =
# 2. Send any message TO your bot, then visit:
#    https://api.telegram.org/bot<TOKEN>/getUpdates
#    Find "chat":{"id":...} in the result and paste that number below.
#    For group chats: add the bot to the group first, then send a message.
#    For channels: the id starts with -100 (e.g. -1001234567890)
# 3. Use Settings -> Telegram in the web UI to send a test message before restarting.
chat_id =

[storage]
# Disk usage threshold (percentage) above which oldest photos are auto-deleted
disk_threshold_pct = 80
# Partition is auto-detected from the mount point where app.py resides.
# No manual configuration needed.
